
 <!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QuizVerse | Audio Edition</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>

        :root {

            --bg: #050510;

            --glass: rgba(255, 255, 255, 0.05);

            --primary: #00d2ff;

            --accent: #9d50bb;

            --success: #00f260;

            --error: #f00000;

            --gold: #ffd700;

            --glow: 0 0 15px rgba(0, 210, 255, 0.4);

        }



        body {

            margin: 0; font-family: 'Orbitron', sans-serif;

            background: radial-gradient(circle at center, #1a1a40 0%, #050510 100%);

            color: white; display: flex; justify-content: center; align-items: center;

            min-height: 100vh; overflow: hidden;

        }



        .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }



        #game-box {

            width: 90%; max-width: 700px; background: rgba(5, 5, 16, 0.9);

            backdrop-filter: blur(20px); border-radius: 20px; padding: 40px;

            border: 2px solid var(--primary); box-shadow: var(--glow);

            position: relative;

        }



.main-title {
    font-size: 3rem;
    margin: 0;
    background: linear-gradient(to right, #00d2ff, #9d50bb);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    letter-spacing: 5px;
    text-shadow: var(--glow);
}



        .screen { display: none; text-align: center; }

        .active { display: block; animation: zoomIn 0.4s ease-out; }



        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; margin: 20px 0; overflow: hidden; }

        #progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: var(--glow); transition: 0.5s; }



        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }

       

        button.game-btn {

            background: rgba(0, 210, 255, 0.1); border: 1px solid var(--primary);

            padding: 15px; color: white; border-radius: 5px; font-weight: bold;

            cursor: pointer; transition: 0.3s; font-family: 'Orbitron';

            text-transform: uppercase;

        }

       

        button.game-btn:hover {

            background: var(--primary); color: #000; box-shadow: var(--glow);

            transform: scale(1.05);

        }



        .option {

            width: 100%; background: rgba(255,255,255,0.05); margin: 10px 0;

            text-align: left; padding: 18px; border-radius: 8px;

            border: 1px solid rgba(0, 210, 255, 0.3); color: white;

            cursor: pointer; font-family: 'Segoe UI'; transition: 0.2s;

        }

        .option:hover { border-color: var(--primary); background: rgba(0, 210, 255, 0.1); }

        .correct { background: var(--success) !important; color: #000; font-weight: bold; border: none; }

        .wrong { background: var(--error) !important; border: none; }



        #rank-tag { margin-top: 20px; font-size: 1.2rem; padding: 10px; border: 1px solid; display: inline-block; }



        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    </style>

</head>

<body>


    <div class="particles" id="particles"></div>



    <div id="game-box">

        <div id="welcome-screen" class="active">

            <h1 class="main-title">QuizVerse</h1>
<p style="color: var(--gold); letter-spacing: 4px; font-size: 0.8rem;">
    GAMIFIED LEARNING PLATFORM
</p>
            <p style="color: var(--gold); letter-spacing: 4px; font-size: 0.8rem;">AUDIO MODULE: ACTIVE</p>

            <button class="game-btn" style="margin-top: 40px; padding: 20px 60px;" onclick="initAudio(); showScreen('lang-screen')">BOOT UP</button>

        </div>



        <div id="lang-screen" class="screen">

            <h2 style="color: var(--primary);">SELECT CORE MODULE</h2>

            <div class="grid">

                <button class="game-btn" onclick="playSound('click'); pickLang('python')">🐍 PYTHON</button>

                <button class="game-btn" onclick="playSound('click'); pickLang('java')">☕ JAVA</button>

                <button class="game-btn" onclick="playSound('click'); pickLang('html')">🌐 HTML/CSS</button>

                <button class="game-btn" onclick="playSound('click'); pickLang('cpp')">⚙️ C++</button>

            </div>

        </div>



        <div id="diff-screen" class="screen">

            <h2 id="chosen-lang-label" style="color: var(--accent);">LEVEL</h2>

            <div class="grid">

                <button class="game-btn" onclick="playSound('click'); startQuiz('beginner')">JUNIOR</button>

                <button class="game-btn" onclick="playSound('click'); startQuiz('intermediate')">SENIOR</button>

                <button class="game-btn" onclick="playSound('click'); startQuiz('expert')">TECH LEAD</button>

            </div>

        </div>



        <div id="quiz-screen" class="screen">

            <div class="progress-container">

                <div id="progress-bar"></div>

            </div>

           <p id="q-meta"></p>
<h3 id="timer" style="color: gold;">TIME: 10s</h3>
<h3 id="q-text"></h3>

            <h3 id="q-text" style="font-family: 'Segoe UI'; min-height: 60px;"></h3>

            <div id="options-container"></div>

        </div>



        <div id="result-screen" class="screen">

    <h1 id="res-emoji" style="font-size: 4rem;">🎉</h1>

    <h2 id="res-score"></h2>

    <div id="rank-tag"></div>

    <div id="analytics-box" style="margin-top:20px; text-align:left;">

        <h3>📊 Performance Analytics</h3>

        <p id="correct-count"></p>
        <p id="wrong-count"></p>
        <p id="lang-played"></p>
        <p id="difficulty-played"></p>

        <div style="background:#111; height:10px; border-radius:5px;">
            <div id="accuracy-bar" style="height:10px; width:0%; background:lime;"></div>
        </div>

    </div>

    <button class="game-btn" style="margin-top:30px; width:100%;" onclick="location.reload()">
        RE-INITIALIZE SYSTEM
    </button>

</div>

        </div>

    </div>


<script>

let quizData = {};
let audioCtx = null;
let timerInterval;
let timeLeft = 10;

let game = {
    lang: '',
    diff: '',
    score: 0,
    index: 0,
    questions: []
};

// ---------------- LOAD JSON ----------------
fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    quizData = data;
    console.log("Questions loaded successfully");
  })
  .catch(err => {
    console.log("Error loading JSON:", err);
  });

// ---------------- AUDIO INIT ----------------
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// ---------------- SCREEN SWITCH ----------------
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ---------------- SOUND ----------------
function playSound(type) {
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
    }

    if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(500, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
    }

    if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
    }

    gain.gain.setValueAtTime(0.1, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);

    osc.start(now);
    osc.stop(now + 0.3);
}

// ---------------- LANGUAGE ----------------
function pickLang(l) {
    game.lang = l;
    document.getElementById('chosen-lang-label').innerText = l.toUpperCase() + " SYSTEM";
    showScreen('diff-screen');
}

// ---------------- START QUIZ ----------------
function startQuiz(d) {

    if (!quizData[game.lang]) {
        alert("Questions not loaded yet.");
        return;
    }

    game.diff = d;

    game.questions = [...quizData[game.lang][game.diff]]
        .sort(() => Math.random() - 0.5);

    game.index = 0;
    game.score = 0;

    showScreen('quiz-screen');
    loadQuestion();
}

// ---------------- TIMER ----------------
function startTimer() {
    clearInterval(timerInterval);

    timeLeft = 10;
    const timer = document.getElementById("timer");
    timer.style.color = "gold";
    timer.innerText = `TIME: ${timeLeft}s`;

    timerInterval = setInterval(() => {
        timeLeft--;
        timer.innerText = `TIME: ${timeLeft}s`;

        if (timeLeft <= 3) timer.style.color = "red";

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            autoWrongAnswer();
        }
    }, 1000);
}

// ---------------- LOAD QUESTION ----------------
function loadQuestion() {

    startTimer();

    const total = game.questions.length;
    const q = game.questions[game.index];

    if (!q) {
        showResult();
        return;
    }

    document.getElementById('progress-bar').style.width =
        ((game.index) / total) * 100 + "%";

    document.getElementById('q-meta').innerText =
        `DATA_PACK: ${game.index + 1} / ${total}`;

    document.getElementById('q-text').innerText = q.q;

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    q.a.forEach((txt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option animate__animated animate__fadeInLeft';
        btn.innerText = txt;
        btn.onclick = () => checkAnswer(i, btn);
        container.appendChild(btn);
    });
}

// ---------------- ANSWER CHECK ----------------
function checkAnswer(choice, btn) {

    clearInterval(timerInterval);

    const q = game.questions[game.index];
    const correct = q.c;

    const all = document.querySelectorAll('.option');
    all.forEach(b => b.disabled = true);

    if (choice === correct) {
        btn.classList.add('correct');
        game.score++;
        playSound('correct');
        confetti({ particleCount: 30, spread: 60 });
    } else {
        btn.classList.add('wrong');
        playSound('wrong');
        all[correct].classList.add('correct');
    }

    setTimeout(() => {
        game.index++;

        if (game.index < game.questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }, 1000);
}

// ---------------- AUTO FAIL ----------------
function autoWrongAnswer() {

    const q = game.questions[game.index];
    const correct = q.c;

    const all = document.querySelectorAll('.option');
    all.forEach(b => b.disabled = true);

    playSound('wrong');
    all[correct].classList.add('correct');

    setTimeout(() => {
        game.index++;

        if (game.index < game.questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }, 1000);
}

// ---------------- RESULT ----------------
function showResult() {

    showScreen('result-screen');

    const total = game.questions.length;
    const wrong = total - game.score;
    const accuracy = ((game.score / total) * 100).toFixed(1);

    document.getElementById('res-score').innerText =
        `ACCURACY: ${accuracy}%`;

    document.getElementById('correct-count').innerText =
        "✅ Correct Answers: " + game.score;

    document.getElementById('wrong-count').innerText =
        "❌ Wrong Answers: " + wrong;

    document.getElementById('lang-played').innerText =
        "📚 Language: " + game.lang.toUpperCase();

    document.getElementById('difficulty-played').innerText =
        "🧩 Level: " + game.diff.toUpperCase();

    document.getElementById('accuracy-bar').style.width = accuracy + "%";

    const rankTag = document.getElementById('rank-tag');

    let rank = "";
    let color = "";

    if (game.score === total) {
        rank = "SYSTEM ARCHITECT";
        color = "#ffd700";
    } else if (game.score >= total / 2) {
        rank = "SENIOR DEVELOPER";
        color = "#00d2ff";
    } else {
        rank = "JUNIOR CODER";
        color = "#ff4b2b";
    }

    rankTag.innerText = "RANK: " + rank;
    rankTag.style.borderColor = color;
    rankTag.style.color = color;
}

// ---------------- PARTICLES ----------------
const pCon = document.getElementById('particles');

for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.style.cssText =
        `position:absolute;width:1px;height:1px;background:#00d2ff;
         top:${Math.random()*100}%;left:${Math.random()*100}%;
         opacity:0.4;box-shadow:0 0 5px #00d2ff;`;
    pCon.appendChild(p);
}

</script>

</body>

</html>
